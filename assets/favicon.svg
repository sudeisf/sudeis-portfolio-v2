<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Deep premium dark gradient for the background tile -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E0F12" />
      <stop offset="100%" stop-color="#050507" />
    </linearGradient>
    <!-- Delicate shadow filter to give the white 'S' depth -->
    <filter id="premiumGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Clean rounded slate background tile with subtle premium border -->
  <rect x="1" y="1" width="30" height="30" rx="9" fill="url(#bgGrad)" stroke="#1F2024" stroke-width="1.2"/>
  
  <!-- Symmetrical, geometrically perfect, bold white 'S' curve -->
  <path d="M22 9h-8a3.5 3.5 0 0 0 0 7h4a3.5 3.5 0 0 1 0 7h-8" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#premiumGlow)" />
</svg>
